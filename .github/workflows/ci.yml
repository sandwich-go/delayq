name: CI

on:
  push:
    branches: [main, "*/develop", "*/release"]
  pull_request:
    branches: [main, "*/develop", "*/release"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.20", "1.21", "1.22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -count=1 -timeout 5m ./...

  integration:
    name: Integration (Redis ${{ matrix.redis }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        redis: ["6", "7"]
    services:
      redis:
        image: redis:${{ matrix.redis }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run integration tests
        env:
          REDIS_ADDR: 127.0.0.1:6379
        run: go test -tags=integration -race -count=1 -timeout 5m -run TestIntegration ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Generate coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 5m ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7
