name: Benchmark

on:
  workflow_dispatch:
    inputs:
      benchtime:
        description: "benchtime per benchmark (e.g. 2s, 5x, 100000x)"
        required: false
        default: "2s"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  bench-memory:
    name: Memory Benchmarks (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run memory benchmarks
        run: |
          go test -run=^$ -bench='Benchmark' -benchmem \
            -benchtime=${{ github.event.inputs.benchtime || '2s' }} \
            -timeout=10m -count=1 . | tee bench-memory.txt

      - name: Print summary
        run: |
          echo "=== Memory Benchmark Summary ==="
          grep -E "^Benchmark|^goos:|^goarch:|^cpu:|^pkg:" bench-memory.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-memory-linux
          path: bench-memory.txt
          retention-days: 90

  bench-redis:
    name: Redis Benchmarks (Linux)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run Redis benchmarks
        env:
          REDIS_ADDR: 127.0.0.1:6379
        run: |
          go test -tags=integration -run=^$ -bench='BenchmarkRedisQueue' -benchmem \
            -benchtime=${{ github.event.inputs.benchtime || '2s' }} \
            -timeout=10m -count=1 . | tee bench-redis.txt

      - name: Print summary
        run: |
          echo "=== Redis Benchmark Summary ==="
          grep -E "^Benchmark|^goos:|^goarch:|^cpu:|^pkg:" bench-redis.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-redis-linux
          path: bench-redis.txt
          retention-days: 90

  bench-summary:
    name: Combined Summary
    needs: [bench-memory, bench-redis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bench-memory-linux
      - uses: actions/download-artifact@v4
        with:
          name: bench-redis-linux

      - name: Generate summary
        run: |
          {
            echo "## Benchmark Results (Linux ubuntu-latest)"
            echo ""
            echo "Generated by GitHub Actions on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "### Memory Queue"
            echo ""
            echo '```'
            grep -E "^Benchmark|^goos:|^goarch:|^cpu:|^pkg:" bench-memory.txt
            echo '```'
            echo ""
            echo "### Redis Queue (Redis 7-alpine, localhost service container)"
            echo ""
            echo '```'
            grep -E "^Benchmark|^goos:|^goarch:|^cpu:|^pkg:" bench-redis.txt
            echo '```'
          } > BENCH_SUMMARY.md
          cat BENCH_SUMMARY.md >> $GITHUB_STEP_SUMMARY

      - name: Upload combined summary
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary
          path: BENCH_SUMMARY.md
          retention-days: 365
